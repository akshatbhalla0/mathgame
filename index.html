<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math game</title>
    <link rel="stylesheet" href="mathgame.css">
</head>
<body>
    <div class="con">
        <header>
            <h1>Press any key to start game</h1>
        </header>
        <div class="box">
            <div class="sec">15s</div>
            <h2 id="qu">Start please</h2>
            <div class="op">
                <option value="" class="but" id="o1">option 1</option>
                <option value="" class="but" id="o2">option 2</option>
                <option value="" class="but" id="o3">option 3</option>
                <option value="" class="but" id="o4">option 4</option>
            </div>
        </div>
        <div class="play">
            <div class="mid" id="play" >PLAY</div>
        </div>
    </div>



     <script src="mathgame.js"></script>
    
</body>
</html>
